<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle - WiCONTABLE</title>
    <link rel="icon" href="img/logowi.png" type="image/png">
    <meta property="og:title" content="Catálogo WiCONTABLE - Premium">
    <meta property="og:description" content="Somos tu mejor aliado para automatizar procesos y optimizar tu gestión con herramientas contables 100% garantizadas.">
    <meta property="og:image" content="https://wicontable.github.io/catalogo/img/logowi.png">
    <meta property="og:url" content="https://wicontable.github.io/catalogo/index.html">
    <meta property="og:type" content="website">
    <style>
        :root { 
            --ws-green: #25D366; 
            --ws-dark: #128C7E; 
            --bg-gray: #f8f9fa; 
            --card-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            --text-main: #333;
            /* Colores Redes Sociales */
            --fb-color: #1877F2; --li-color: #0077b5; --tk-color: #000000;
            --yt-color: #FF0000; --ig-color: #E4405F;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; position: relative; color: var(--text-main); }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('img/logowi.png'); background-repeat: no-repeat; background-position: center; background-size: 40%; opacity: 0.04; z-index: 1000; pointer-events: none; }

        /* Barra superior */
        .marquee-wrapper { width: 100%; overflow: hidden; background: white; padding: 12px 0; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .marquee-content { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scroll-text 30s linear infinite; font-weight: 600; color: #008f39; }
        @keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .main-wrapper { max-width: 1100px; margin: 0 auto; padding: 20px; min-height: 80vh; }
        .back-btn { display: inline-block; margin-bottom: 30px; text-decoration: none; color: #333; font-weight: bold; font-size: 1.1rem; }

        /* --- 1. SECCIÓN SUPERIOR --- */
        .product-top-section { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; margin-bottom: 40px; }
        .mobile-only { display: none; }
        
        @media (max-width: 850px) { 
            .product-top-section { grid-template-columns: 1fr; } 
            .desktop-only { display: none; }
            .mobile-only { display: block; }
        }

        .product-left { display: flex; flex-direction: column; gap: 20px; }
        .carousel { position: relative; aspect-ratio: 4/5; overflow: hidden; background: #fff; border-radius: 20px; box-shadow: var(--card-shadow); }
        .slides { display: flex; transition: 0.5s; height: 100%; }
        .slides img { width: 100%; object-fit: contain; flex-shrink: 0; padding: 20px; box-sizing: border-box; }
        
        /* Caja de soporte */
        .important-note { background: #fffde7; padding: 25px; border-radius: 15px; border: 1px solid #fbc02d; font-size: 0.9rem; line-height: 1.5; box-shadow: 0 4px 10px rgba(0,0,0,0.03); color: green; }

        .product-title { font-size: 2.2rem; margin: 0 0 10px 0; color: #000; font-weight: 800; }
        .product-ref { font-size: 0.95rem; color: #666; font-weight: 600; margin-bottom: 25px; display: inline-block; background: #e0e0e0; padding: 4px 10px; border-radius: 5px; }
        .product-desc { font-size: 1.05rem; line-height: 1.6; color: #444; margin-bottom: 20px; }
        
        .features-title { font-weight: 700; margin-bottom: 10px; display: block; color: #000; }
        .features { list-style: none; padding: 0; margin: 0 0 25px 0; }
        .features li { margin-bottom: 12px; display: flex; align-items: flex-start; line-height: 1.4; color: #333; }
        .features li::before { content: "✅"; margin-right: 12px; font-size: 1.1rem; }

        /* Lista de hipervínculos (Compartir, Video, Formato) */
        .tech-links { background: rgba(37, 211, 102, 0.05); padding: 20px; border-radius: 12px; border-left: 4px solid var(--ws-green); display: flex; flex-direction: column; gap: 12px; }
        .tech-links-row { display: flex; align-items: center; font-size: 0.95rem; }
        .tech-links-label { font-weight: 800; color: #128C7E; width: 130px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        .tech-link { color: #1877F2; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
        .tech-link:hover { text-decoration: underline; color: #0000CD; }
        .tech-value { font-weight: 600; color: #444; }

        /* Botones del Carrusel */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 50%;
            z-index: 10;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { background: var(--ws-green); box-shadow: 0 4px 10px rgba(37, 211, 102, 0.4); }
        .prev { left: 10px; }
        .next { right: 10px; }

        /* --- 2. SECCIÓN CENTRAL (DISEÑO FUTURISTA) --- */
        .product-middle-section { 
            background: linear-gradient(145deg, #ffffff, #f4f7f6);
            border-radius: 20px; 
            border: 1px solid rgba(18, 140, 126, 0.15); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
            margin-bottom: 50px; 
            overflow: hidden; 
            position: relative;
        }
        
        .product-middle-section::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #25D366, #128C7E, #0000CD, #25D366);
            background-size: 200% auto;
            animation: gradient-glow 3s linear infinite;
        }
        @keyframes gradient-glow { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        .futuristic-tab-container { padding: 0 30px; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(255,255,255,0.5); }
        .futuristic-tab { display: inline-block; padding: 20px 0; font-size: 1.1rem; color: var(--ws-dark); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-bottom: 3px solid var(--ws-green); margin-bottom: -1px; }
        
        .tab-content { padding: 40px 30px; }
        .tab-content h3 { font-size: 1.6rem; color: #222; margin-top: 0; font-weight: 800; letter-spacing: -0.5px; }
        .tab-content p { line-height: 1.7; color: #555; font-size: 1.05rem; }

        /* Acordeón FAQ */
        .faq-title { text-align: center; color: #0000CD; margin: 50px 0 25px; font-size: 1.4rem; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase; }
        .faq-item { border: 1px solid #eee; margin-bottom: 10px; border-radius: 10px; overflow: hidden; background: white; transition: 0.3s; }
        .faq-item:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .faq-question { padding: 18px 20px; background: #fff; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; color: #333; font-size: 0.95rem; user-select: none; }
        .faq-answer { padding: 20px; background: #fafafa; display: none; color: #555; line-height: 1.6; border-top: 1px dashed #eee; font-size: 0.95rem; }

        /* --- 3. SECCIÓN INFERIOR --- */
        .btn-buy-large { display: inline-block; background: var(--ws-green); color: white; border-radius: 12px; text-decoration: none; font-weight: 800; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-buy-large:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5); background: #20bd5a; }

        /* Carrusel Otros Productos */
        .scroll-section { margin: 40px 0; }
        .scroll-container { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: thin; }
        .mini-card { flex: 0 0 160px; background: white; border-radius: 15px; padding: 15px 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-decoration: none; color: inherit; border: 1px solid #eee; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .mini-card:hover { transform: translateY(-5px); border-color: var(--ws-green); }
        .mini-img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .mini-card h4 { margin: 0 0 10px 0; font-size: 0.85rem; font-weight: 600; line-height: 1.2; }
        .mini-price { font-size: 0.95rem; font-weight: 800; color: var(--ws-dark); background: rgba(37, 211, 102, 0.1); padding: 5px 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }

        /* --- ETIQUETAS LUMINOSAS --- */
        .badge-base {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            font-size: 0.70rem;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 20;
        }

        .badge-nuevo { background: linear-gradient(90deg, #ff0000, #ff8c00, #ff0000); background-size: 200% auto; box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); animation: glow-pulse-nuevo 2s linear infinite; }
        @keyframes glow-pulse-nuevo { 0% { background-position: 0% center; box-shadow: 0 0 8px rgba(255,0,0,0.4); } 50% { box-shadow: 0 0 18px rgba(255,80,0,0.9); } 100% { background-position: 200% center; box-shadow: 0 0 8px rgba(255,0,0,0.4); } }

        .badge-manten { background: linear-gradient(90deg, #e65c00, #F9D423, #e65c00); background-size: 200% auto; box-shadow: 0 0 10px rgba(230, 92, 0, 0.5); animation: glow-pulse-manten 2.5s linear infinite; }
        @keyframes glow-pulse-manten { 0% { background-position: 0% center; box-shadow: 0 0 8px rgba(230,92,0,0.4); } 50% { box-shadow: 0 0 18px rgba(249,212,35,0.8); } 100% { background-position: 200% center; box-shadow: 0 0 8px rgba(230,92,0,0.4); } }

        .badge-prod { background: linear-gradient(90deg, #0052D4, #4364F7, #6FB1FC, #0052D4); background-size: 200% auto; box-shadow: 0 0 10px rgba(67, 100, 247, 0.5); animation: glow-pulse-prod 3s linear infinite; }
        @keyframes glow-pulse-prod { 0% { background-position: 0% center; box-shadow: 0 0 8px rgba(67,100,247,0.4); } 50% { box-shadow: 0 0 18px rgba(111,177,252,0.9); } 100% { background-position: 200% center; box-shadow: 0 0 8px rgba(67,100,247,0.4); } }

        .badge-activa { background: linear-gradient(90deg, #11998e, #38ef7d, #11998e); background-size: 200% auto; box-shadow: 0 0 10px rgba(56, 239, 125, 0.5); animation: glow-pulse-activa 2s linear infinite; }
        @keyframes glow-pulse-activa { 0% { background-position: 0% center; box-shadow: 0 0 8px rgba(17,153,142,0.4); } 50% { box-shadow: 0 0 18px rgba(56,239,125,0.9); } 100% { background-position: 200% center; box-shadow: 0 0 8px rgba(17,153,142,0.4); } }

        .badge-agotado { background: linear-gradient(90deg, #606060, #8f8f8f, #606060); background-size: 200% auto; box-shadow: 0 0 10px rgba(96, 96, 96, 0.5); animation: glow-pulse-agotado 3s linear infinite; }
        @keyframes glow-pulse-agotado { 0% { background-position: 0% center; box-shadow: 0 0 8px rgba(96,96,96,0.4); } 50% { box-shadow: 0 0 15px rgba(143,143,143,0.8); } 100% { background-position: 200% center; box-shadow: 0 0 8px rgba(96,96,96,0.4); } }

        .badge-disponible { background: linear-gradient(90deg, #00c6ff, #0072ff, #00c6ff); background-size: 200% auto; box-shadow: 0 0 10px rgba(0, 198, 255, 0.5); animation: glow-pulse-disponible 2s linear infinite; }
        @keyframes glow-pulse-disponible { 0% { background-position: 0% center; box-shadow: 0 0 8px rgba(0,198,255,0.4); } 50% { box-shadow: 0 0 18px rgba(0,114,255,0.9); } 100% { background-position: 200% center; box-shadow: 0 0 8px rgba(0,198,255,0.4); } }

        /* --- FOOTER REDES SOCIALES --- */
        .main-footer { background: white; padding: 40px 20px; margin-top: 60px; text-align: center; border-top: 1px solid #eee; position: relative; z-index: 1001; }
        .footer-content { max-width: 1200px; margin: 0 auto; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .social-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .social-btn:hover { transform: scale(1.1); }
        .social-btn svg { width: 24px; height: 24px; fill: white; }
        .bg-fb { background-color: var(--fb-color); } .bg-ig { background-color: var(--ig-color); }
        .bg-tk { background-color: var(--tk-color); } .bg-li { background-color: var(--li-color); }
        .bg-yt { background-color: var(--yt-color); } .bg-no { background-color: #000; }

    </style>
</head>

    <script>
        const id = parseInt(new URLSearchParams(window.location.search).get('id'));
        const p = productos.find(item => item.id === id);

        if (p) {
            // Extraer la Referencia (REF)
            let refText = "";
            let cleanDesc = p.desc;
            const refMatch = p.desc.match(/<b>(REF\d{3})<\/b>/);
            if (refMatch) {
                refText = refMatch[1];
                cleanDesc = p.desc.replace(/<b>REF\d{3}<\/b>\s*/, '');
            }

            // Leer el formato directamente desde productos.js
            let formatoText = p.formato || "Software / Herramienta";

            // 1. Evaluar si el producto debe mostrar la sección técnica
            let seccionTecnicaHTML = "";
            if (p.mostrarTecnica === true) {
                seccionTecnicaHTML = `
                <div class="product-middle-section">
                    <div class="futuristic-tab-container">
                        <div class="futuristic-tab">Descripción Técnica</div>
                    </div>
                    
                    <div class="tab-content">
                        <h3>Detalles Adicionales de la Herramienta</h3>

                            <div class="faq-answer">Para garantizar la mejor experiencia, es fundamental que visualice previamente el video tutorial de funcionamiento. Una vez confirmado el pago, nos pondremos en contacto con usted a través de WhatsApp y AnyDesk para realizar la instalación y activación del producto correspondiente. (<b>RECUERDE</b> que se requiere versión Windows 10 ó preferiblemente Windows 11 para un mejor rendimiento en los ejecutable .exe y Navegadores Chrome - Brave - Edge en las extensiones web .crx). Adicionalmente, brindaremos un espacio para resolver cualquier inquietud que no haya sido aclarada en el video de apoyo.</div>
                        </div>
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFaq(this)">¿Cuánto se demora el envío o instalación después de hacer el pago? <span style="color:#128C7E;">▼</span></div>

                        </div>
                        <div class="faq-item">
                            <div class="faq-question" onclick="toggleFaq(this)">¿Que horarios manejan para soporte? <span style="color:#128C7E;">▼</span></div>
                            <div class="faq-answer">Colega, si Dios lo permite, estamos disponibles en el siguiente horario: Lunes a sábado de 7:00am a 9:00pm y Domingos y festivos 9:00am a 9:00pm</div>
                        </div>
                    </div>
                </div>`;
            }

            // Lógica de Inteligencia para las etiquetas (Igual que en index)
            let badgeHTML = '';
            if (p.etiqueta) {
                let textUpper = p.etiqueta.toUpperCase();
                let badgeColorClass = 'badge-activa'; // Por defecto verde
                
                if (textUpper.includes('NUEVO')) {
                    badgeColorClass = 'badge-nuevo';
                } else if (textUpper.includes('MANTENIMIENTO')) {
                    badgeColorClass = 'badge-manten';
                } else if (textUpper.includes('PRODUCCI')) { 
                    badgeColorClass = 'badge-prod';
                } else if (textUpper.includes('ACTIVA') || textUpper.includes('ACTIVO')) {
                    badgeColorClass = 'badge-activa';
                } else if (textUpper.includes('AGOTADO')) {
                    badgeColorClass = 'badge-agotado';
                } else if (textUpper.includes('DISPONIBLE')) {
                    badgeColorClass = 'badge-disponible';
                }

                badgeHTML = `<div class="badge-base ${badgeColorClass}">${p.etiqueta}</div>`;
            }

            // 2. HTML Estructurado final
            document.getElementById('product-content').innerHTML = `
                <div class="product-top-section">
                    <div class="product-left">
                        <div class="carousel">
                            ${badgeHTML} <div class="slides" id="slides">${p.fotos.map(f => `<img src="${f}" alt="${p.nombre}">`).join('')}</div>
${p.fotos.length > 1 ? '<button class="nav-btn prev" onclick="moveSlide(-1)">❮</button><button class="nav-btn next" onclick="moveSlide(1)">❯</button>' : ''}
                        </div>
                        <div class="important-note desktop-only">
                            <b>SOPORTE:</b><br><br>${p.nota}
                        </div>
                    </div>
                    
                    <div class="product-right">
                        <h1 class="product-title">${p.nombre}</h1>
                        ${refText ? `<span class="product-ref">${refText}</span>` : ''}
                        
                        <div class="product-desc">${cleanDesc}</div>
                        
                        <span class="features-title">Podrás utilizarla de la siguiente manera:</span>
                        <ul class="features">${p.caracteristicas.map(f => `<li>${f}</li>`).join('')}</ul>
                        
                        <div class="tech-links">
                            <div class="tech-links-row">
                                <span class="tech-links-label">Compartir:</span>
                                <a href="https://wa.me/?text=Mire esta herramienta contable es interesante para adquirirla: ${encodeURIComponent(p.nombre)} - ${encodeURIComponent(window.location.href)}" class="tech-link" target="_blank">
                                    📲 Enviar por WhatsApp a un colega
                                </a>
                            </div>
                            
                            ${(p.video && p.video !== "#" && p.video !== "") ? `
                            <div class="tech-links-row">
                                <span class="tech-links-label">Videotutorial:</span>
                                <a href="${p.video}" class="tech-link" target="_blank">
                                    🎥 Ver funcionamiento de la herramienta
                                </a>
                            </div>` : ''}

                            <div class="tech-links-row">
                                <span class="tech-links-label">Formato:</span>
                                <span class="tech-value">💻 ${formatoText}</span>
                            </div>
                        </div>

                        <div style="margin-top: 35px; display: flex; align-items: center; gap: 25px; flex-wrap: wrap;">
                            <div style="font-size: 2.6rem; font-weight: 900; color: #000; letter-spacing: -1px;">${p.precio}</div>
                            <a href="https://wa.me/${miTelefono}?text=¡Hola! Vengo del catálogo digital, revisé la información del producto y quiero adquirirla. ¿Cómo procedemos con el pago y la activación de: ${encodeURIComponent(p.nombre)}" class="btn-buy-large" style="padding: 15px 35px; font-size: 1.1rem; margin: 0;" target="_blank">Pedir por WhatsApp</a>
                        </div>
                    </div>
                </div>

                <div class="important-note mobile-only" style="margin-bottom: 40px;">
                    <b>SOPORTE:</b><br><br>${p.nota}
                </div>

                ${seccionTecnicaHTML}
            `;
        }

const scrollBox = document.getElementById('product-scroll');
        productos.forEach(prod => {
            if(prod.id !== id) {
                const m = document.createElement('a');
                m.className = 'mini-card'; 
                m.href = `detalle.html?id=${prod.id}`;
                m.style.position = 'relative'; // Asegura que la etiqueta no se salga de la tarjeta

                // Lógica de Inteligencia para las etiquetas del scroll
                let miniBadgeHTML = '';
                if (prod.etiqueta) {
                    let textUpper = prod.etiqueta.toUpperCase();
                    let badgeColorClass = 'badge-activa'; 
                    
                    if (textUpper.includes('NUEVO')) {
                        badgeColorClass = 'badge-nuevo';
                    } else if (textUpper.includes('MANTENIMIENTO')) {
                        badgeColorClass = 'badge-manten';
                    } else if (textUpper.includes('PRODUCCI')) { 
                        badgeColorClass = 'badge-prod';
                    } else if (textUpper.includes('ACTIVA') || textUpper.includes('ACTIVO')) {
                        badgeColorClass = 'badge-activa';
                    } else if (textUpper.includes('AGOTADO')) {
                        badgeColorClass = 'badge-agotado';
                    } else if (textUpper.includes('DISPONIBLE')) {
                        badgeColorClass = 'badge-disponible';
                    }

                    // Se le agrega transform: scale(0.75) para que el letrero se vea proporcional a la tarjeta pequeña
                    miniBadgeHTML = `<div class="badge-base ${badgeColorClass}" style="transform: scale(0.75); transform-origin: top right; top: 10px; right: 10px;">${prod.etiqueta}</div>`;
                }

                m.innerHTML = `
                    ${miniBadgeHTML}
                    <img src="${prod.fotos[0]}" class="mini-img" alt="${prod.nombre}">
                    <h4>${prod.nombre}</h4>
                    <div class="mini-price">${prod.precio}</div>
                `;
                scrollBox.appendChild(m);
            }
        });

        window.toggleFaq = (element) => {
            const answer = element.nextElementSibling;
            const icon = element.querySelector('span');
            
            if (answer.style.display === "block") {
                answer.style.display = "none";
                icon.textContent = "▼";
            } else {
                answer.style.display = "block";
                icon.textContent = "▲";
            }
        }

        // Función para el Carrusel de Imágenes
        let currentSlide = 0;
        window.moveSlide = (direction) => {
            const slidesContainer = document.getElementById('slides');
            const totalSlides = slidesContainer.children.length;
            
            currentSlide += direction;

            // Lógica para volver al inicio o al final
            if (currentSlide < 0) {
                currentSlide = totalSlides - 1;
            } else if (currentSlide >= totalSlides) {
                currentSlide = 0;
            }

            // Mueve el contenedor horizontalmente
            slidesContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
        };

    </script>
