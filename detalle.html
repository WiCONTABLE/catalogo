<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle - WiCONTABLE</title>
    <link rel="icon" href="img/logowi.png" type="image/png">
    <style>
        :root { --ws-green: #25D366; --ws-dark: #128C7E; --bg-gray: #f8f9fa; --card-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; position: relative; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('img/logowi.png'); background-repeat: no-repeat; background-position: center; background-size: 40%; opacity: 0.04; z-index: 1000; pointer-events: none; }

        .marquee-wrapper { width: 100%; overflow: hidden; background: white; padding: 12px 0; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .marquee-content { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scroll-text 30s linear infinite; font-weight: 600; color: #008f39; }
        @keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .main-wrapper { max-width: 1100px; margin: 0 auto; padding: 20px; min-height: 80vh; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #333; font-weight: bold; }

        .detail-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: var(--card-shadow); display: grid; grid-template-columns: 1fr 1.2fr; margin-bottom: 40px; }
        @media (max-width: 850px) { .detail-card { grid-template-columns: 1fr; } }

        .carousel { position: relative; aspect-ratio: 1/1; overflow: hidden; background: #fff; border-right: 1px solid #eee; }
        .slides { display: flex; transition: 0.5s; height: 100%; }
        .slides img { width: 100%; object-fit: contain; flex-shrink: 0; }
        .nav-btn { position: absolute; top: 50%; background: rgba(255,255,255,0.9); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transform: translateY(-50%); }
        .prev { left: 10px; } .next { right: 10px; }

        .info-content { padding: 30px; }
        .features { list-style: none; padding: 0; margin: 15px 0; }
        .features li::before { content: "✅"; margin-right: 10px; }
        .share-row { display: flex; gap: 10px; margin: 20px 0; align-items: center; }
        .share-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        
        .important-note { background: #fff9c4; padding: 15px; border-radius: 12px; border-left: 5px solid #fbc02d; font-size: 0.9rem; margin: 20px 0; }
        .price { font-size: 2.2rem; font-weight: 800; color: #000; margin-bottom: 20px; }
        .btn-buy { display: block; background: var(--ws-green); color: white; text-align: center; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }

        /* SCROLL HORIZONTAL */
        .scroll-section { margin: 40px 0; }
        .scroll-container { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: thin; }
        .mini-card { flex: 0 0 160px; background: white; border-radius: 20px; padding: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: inherit; border: 1px solid #eee; transition: 0.2s; }
        .mini-card:hover { transform: scale(1.05); border-color: var(--ws-green); }
        .mini-img { width: 100%; height: 90px; object-fit: contain; }

        .main-footer { background: white; padding: 40px 20px; text-align: center; border-top: 1px solid #eee; position: relative; z-index: 1001; }
    </style>
</head>
<body>
    <div class="marquee-wrapper">
        <div class="marquee-content">Somos tu mejor aliado para automatizar procesos que te ahorrarán tiempo, con HERRAMIENTAS CONTABLES 100% garantizadas.</div>
    </div>

    <div class="main-wrapper">
        <a href="index.html" class="back-btn">← Volver al Catálogo</a>
        <div id="product-content"></div>

        <div class="scroll-section">
            <p><b>OTROS PRODUCTOS DISPONIBLES:</b></p>
            <div class="scroll-container" id="product-scroll"></div>
        </div>
    </div>

    <footer class="main-footer">
        <p style="font-size: 0.8rem; color: #999;">© 2026 WiCONTABLE</p>
    </footer>

    <script src="productos.js"></script>
    <script>
        const id = parseInt(new URLSearchParams(window.location.search).get('id'));
        const p = productos.find(item => item.id === id);

        if (p) {
            document.getElementById('product-content').innerHTML = `
                <div class="detail-card">
                    <div class="carousel">
                        <div class="slides" id="slides">${p.fotos.map(f => `<img src="${f}">`).join('')}</div>
                        ${p.fotos.length > 1 ? '<button class="nav-btn prev" onclick="moveSlide(-1)">❮</button><button class="nav-btn next" onclick="moveSlide(1)">❯</button>' : ''}
                    </div>
                    <div class="info-content">
                        <h1 style="margin:0;">${p.nombre}</h1>
                        <p style="color:#555;">${p.desc}</p>
                        <ul class="features">${p.caracteristicas.map(f => `<li>${f}</li>`).join('')}</ul>
                        <div class="share-row">
                            <small><b>Compartir / Videotutorial:</b></small>
                            <a href="https://wa.me/?text=Mira esto: ${encodeURIComponent(p.nombre)} ${encodeURIComponent(window.location.href)}" class="share-btn" style="background:#25D366" target="_blank"><img src="img/whatsapp.png" width="30"></a>
                            ${p.video !== "#" ? `<a href="${p.video}" class="share-btn" style="background:#FF0000" target="_blank"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg></a>` : ''}
                        </div>
                        <div class="important-note"><b>SOPORTE:</b> ${p.nota}</div>
                        <div class="price">${p.precio}</div>
                        <a href="https://wa.me/${miTelefono}?text=Me interesa: ${encodeURIComponent(p.nombre)}" class="btn-buy" target="_blank">Pedir por WhatsApp</a>
                    </div>
                </div>`;
        }

        const scrollBox = document.getElementById('product-scroll');
        productos.forEach(prod => {
            if(prod.id !== id) {
                const m = document.createElement('a');
                m.className = 'mini-card'; m.href = `detalle.html?id=${prod.id}`;
                m.innerHTML = `<img src="${prod.fotos[0]}" class="mini-img"><h4>${prod.nombre}</h4>`;
                scrollBox.appendChild(m);
            }
        });

        let cur = 0;
        window.moveSlide = (s) => {
            const sl = document.getElementById('slides');
            cur = (cur + s + p.fotos.length) % p.fotos.length;
            sl.style.transform = `translateX(-${cur * 100}%)`;
        }
    </script>
</body>
</html>
