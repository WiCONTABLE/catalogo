<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo WiCONTABLE - Premium</title>
    <link rel="icon" href="img/logowi.png" type="image/png">
    <style>
        :root {
            --ws-green: #25D366;
            --ws-dark: #128C7E;
            --bg-gray: #f4f7f6;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --fb-color: #1877F2; --li-color: #0077b5; --tk-color: #000000;
            --yt-color: #FF0000; --ig-color: #E4405F;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            color: #333;
        }

        /* --- MARCA DE AGUA --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('img/logowi.png'); background-repeat: no-repeat;
            background-position: center; background-size: 40%; opacity: 0.03; z-index: -1; pointer-events: none;
        }

        .marquee-wrapper { 
            width: 100%; overflow: hidden; background: white; padding: 10px 0;
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        .marquee-content {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: scroll-text 35s linear infinite; font-weight: 600; color: #008f39;
        }
        @keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .main-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* --- HEADER --- */
        .header-section { text-align: center; margin-bottom: 50px; }
        .header-icon { width: 55px; height: 55px; background-color: var(--ws-green); padding: 12px; border-radius: 15px; fill: white; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .header-section h1 { color: var(--ws-green); margin: 0; font-size: 2.2rem; font-weight: 700; }
        .header-section p { margin: 5px 0; color: #666; }

        /* --- GRID --- */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product-card {
            background: white; 
            border-radius: 40px; 
            overflow: hidden;
            box-shadow: var(--card-shadow); 
            transition: transform 0.3s ease; 
            cursor: pointer;
            text-align: center; 
            padding: 25px 15px; 
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        
        .product-card:hover { transform: translateY(-5px); }

        /* --- ETIQUETAS LUMINOSAS (MÚLTIPLES ESTILOS) --- */
        .badge-base {
            position: absolute;
            top: 15px;
            right: 15px;
            color: white;
            font-size: 0.70rem;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        /* 1. Nuevo (Rojo/Naranja) */
        .badge-nuevo {
            background: linear-gradient(90deg, #ff0000, #ff8c00, #ff0000);
            background-size: 200% auto;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            animation: glow-pulse-nuevo 2s linear infinite;
        }
        @keyframes glow-pulse-nuevo {
            0% { background-position: 0% center; box-shadow: 0 0 8px rgba(255,0,0,0.4); }
            50% { box-shadow: 0 0 18px rgba(255,80,0,0.9); }
            100% { background-position: 200% center; box-shadow: 0 0 8px rgba(255,0,0,0.4); }
        }

        /* 2. Mantenimiento (Naranja/Amarillo) */
        .badge-manten {
            background: linear-gradient(90deg, #e65c00, #F9D423, #e65c00);
            background-size: 200% auto;
            box-shadow: 0 0 10px rgba(230, 92, 0, 0.5);
            animation: glow-pulse-manten 2.5s linear infinite;
        }
        @keyframes glow-pulse-manten {
            0% { background-position: 0% center; box-shadow: 0 0 8px rgba(230,92,0,0.4); }
            50% { box-shadow: 0 0 18px rgba(249,212,35,0.8); }
            100% { background-position: 200% center; box-shadow: 0 0 8px rgba(230,92,0,0.4); }
        }

        /* 3. Producción (Azul/Celeste) */
        .badge-prod {
            background: linear-gradient(90deg, #0052D4, #4364F7, #6FB1FC, #0052D4);
            background-size: 200% auto;
            box-shadow: 0 0 10px rgba(67, 100, 247, 0.5);
            animation: glow-pulse-prod 3s linear infinite;
        }
        @keyframes glow-pulse-prod {
            0% { background-position: 0% center; box-shadow: 0 0 8px rgba(67,100,247,0.4); }
            50% { box-shadow: 0 0 18px rgba(111,177,252,0.9); }
            100% { background-position: 200% center; box-shadow: 0 0 8px rgba(67,100,247,0.4); }
        }

        /* 4. Activa (Verde) */
        .badge-activa {
            background: linear-gradient(90deg, #11998e, #38ef7d, #11998e);
            background-size: 200% auto;
            box-shadow: 0 0 10px rgba(56, 239, 125, 0.5);
            animation: glow-pulse-activa 2s linear infinite;
        }
        @keyframes glow-pulse-activa {
            0% { background-position: 0% center; box-shadow: 0 0 8px rgba(17,153,142,0.4); }
            50% { box-shadow: 0 0 18px rgba(56,239,125,0.9); }
            100% { background-position: 200% center; box-shadow: 0 0 8px rgba(17,153,142,0.4); }
        }

        .card-img { 
            width: 100%; 
            height: 180px; 
            object-fit: contain; 
            margin-bottom: 15px;
        }

        .info h2 { 
            font-size: 1.05rem; 
            margin: 10px 0 5px; 
            color: #000; 
            font-weight: 700; 
        }

        .price-tag { 
            color: var(--ws-dark); 
            font-weight: 700; 
            font-size: 1.1rem; 
            margin-bottom: 8px; 
        }

        .ver-detalles { 
            font-size: 0.85rem; 
            color: #333; 
            text-decoration: none;
        }

        /* --- FOOTER --- */
        .main-footer { background: white; padding: 40px 20px; margin-top: 60px; text-align: center; border-top: 1px solid #eee; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .social-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .social-btn:hover { transform: scale(1.1); }
        .social-btn svg { width: 24px; height: 24px; fill: white; }

        .bg-fb { background-color: var(--fb-color); } .bg-ig { background-color: var(--ig-color); }
        .bg-tk { background-color: var(--tk-color); } .bg-li { background-color: var(--li-color); }
        .bg-yt { background-color: var(--yt-color); } .bg-no { background-color: #000; }

        /* Responsivo para tablets y móviles */
        @media (max-width: 1024px) { .catalog-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .catalog-grid { grid-template-columns: 1fr; } }
    </style>
</head>

    <script src="productos.js"></script>
    <script>
        const container = document.getElementById('catalog');
        
        if (typeof productos === 'undefined') {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; background: #fffde7; padding: 30px; border-radius: 20px; border: 2px solid #fbc02d;"><h2 style="color: red; margin: 0;">⚠️ ¡Aviso Importante!</h2><p style="font-size: 1.1rem; color: #333;">Hay un error de lectura o tu navegador guardó una versión antigua.</p><p><b>Solución:</b> Por favor, presiona <b>Ctrl + F5</b> en tu teclado (o limpia el caché de tu navegador) para cargar los productos correctamente.</p></div>';
        } else {
            productos.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => window.location.href = `detalle.html?id=${p.id}`;
                
                // Lógica de Inteligencia para las etiquetas
                let badgeHTML = '';
                if (p.etiqueta) {
                    let textUpper = p.etiqueta.toUpperCase();
                    let badgeColorClass = 'badge-activa'; // Por defecto verde si pones una palabra que no esté en la lista
                    
                    if (textUpper.includes('NUEVO')) {
                        badgeColorClass = 'badge-nuevo';
                    } else if (textUpper.includes('MANTENIMIENTO')) {
                        badgeColorClass = 'badge-manten';
                    } else if (textUpper.includes('PRODUCCI')) { // Sirve para Producción o Produccion
                        badgeColorClass = 'badge-prod';
                    } else if (textUpper.includes('ACTIVA')) {
                        badgeColorClass = 'badge-activa';
                    }

                    badgeHTML = `<div class="badge-base ${badgeColorClass}">${p.etiqueta}</div>`;
                }

                card.innerHTML = `
                    ${badgeHTML}
                    <img src="${p.fotos[0]}" class="card-img" alt="${p.nombre}">
                    <div class="info">
                        <h2>${p.nombre}</h2>
                        <div class="price-tag">${p.precio}</div>
                        <div class="ver-detalles">Ver más detalles →</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
